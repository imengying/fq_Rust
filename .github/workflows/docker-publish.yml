name: Publish Docker Hub

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version_tag:
        description: "可选镜像标签，例如 v0.1.0；留空则不额外推版本标签"
        required: false
        type: string
      push_latest:
        description: "是否同时推 latest"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve publish tags
        id: vars
        env:
          INPUT_VERSION_TAG: ${{ inputs.version_tag }}
          INPUT_PUSH_LATEST: ${{ inputs.push_latest }}
        shell: bash
        run: |
          set -euo pipefail

          version_tag=""
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version_tag="${GITHUB_REF_NAME}"
          elif [[ -n "${INPUT_VERSION_TAG:-}" ]]; then
            version_tag="${INPUT_VERSION_TAG}"
          fi

          push_latest="true"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            push_latest="${INPUT_PUSH_LATEST:-true}"
          fi

          echo "version_tag=${version_tag}" >> "$GITHUB_OUTPUT"
          echo "push_latest=${push_latest}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.7.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Login to Docker Hub
        uses: docker/login-action@v3.6.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/fq-rust
          tags: |
            type=raw,value=latest,enable=${{ steps.vars.outputs.push_latest == 'true' }}
            type=ref,event=tag
            type=raw,value=${{ steps.vars.outputs.version_tag }},enable=${{ github.event_name == 'workflow_dispatch' && steps.vars.outputs.version_tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-skipped:
    if: ${{ secrets.DOCKERHUB_USERNAME == '' || secrets.DOCKERHUB_TOKEN == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Docker push skipped
        run: |
          echo "Docker Hub secrets not set; skip pushing images."
          echo "Required secrets:"
          echo "  DOCKERHUB_USERNAME"
          echo "  DOCKERHUB_TOKEN"
