name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  rust-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Rust tests
        run: cargo test --workspace
      - name: Rust release build
        run: cargo build --workspace --release
      - name: Upload fq-api artifact
        uses: actions/upload-artifact@v6
        with:
          name: fq-api
          path: target/release/fq-api
          if-no-files-found: error
      - name: Upload fq-runtime-assets artifact
        uses: actions/upload-artifact@v6
        with:
          name: fq-runtime-assets
          path: |
            resources
            third_party/rnidbg/android/sdk23
            configs/config.yaml
          if-no-files-found: error
