name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  rust-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Rust tests
        run: cargo test --workspace
      - name: Rust release build
        run: cargo build --workspace --release
      - name: Upload Rust artifact
        uses: actions/upload-artifact@v6
        with:
          name: fq-api
          path: target/release/fq-api
          if-no-files-found: error

  java-signer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Build signer
        run: mvn -B -f signer/pom.xml -DskipTests package
      - name: Upload signer artifact
        uses: actions/upload-artifact@v6
        with:
          name: fq-signer
          path: |
            signer/target/fq-signer.jar
            signer/src/main/resources
          if-no-files-found: error
